<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Med Aura</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #fffcf7;
        color: #1a1740;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        text-align: center;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(74, 29, 150, 0.15);
        border-top-color: #4a1d96;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="spinner" role="status" aria-label="جارٍ التحميل"></div>
    <p>جارٍ تشغيل Med Aura…</p>
  </body>
</html>
