name: Android APK

# Builds the installable Med Aura Android app (debug-signed) whenever mobile
# code changes, and on demand. Download it from the run's Artifacts section.
on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "mobile/**"
      - "capacitor.config.ts"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Capacitor config into the Android project
        run: pnpm exec cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: med-aura-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
