name: Android APK

# Builds the installable Med Aura Android app (debug-signed) whenever mobile
# code changes, and on demand. Download it from the run's Artifacts section.
on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "mobile/**"
      - "capacitor.config.ts"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write # publishes the APK to the fixed "apk-latest" release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Capacitor config into the Android project
        run: pnpm exec cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: med-aura-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Rename APK for release
        run: cp android/app/build/outputs/apk/debug/app-debug.apk med-aura.apk

      # Fixed-tag release so the site can link the APK directly:
      # https://github.com/mahmoud-fouad2/med-aura/releases/download/apk-latest/med-aura.apk
      - name: Publish APK to the apk-latest release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: تطبيق Med Aura للأندرويد
          body: >
            أحدث نسخة من تطبيق Med Aura للأندرويد — تُبنى تلقائيًا من آخر
            تحديث للمنصة. حمّل med-aura.apk وثبّته مباشرة.
          files: med-aura.apk
