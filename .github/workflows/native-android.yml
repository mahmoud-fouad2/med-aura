name: Native App Android

# Builds the real native Med Aura app (Expo/React Native) into an installable
# debug APK. Native folders are generated fresh on the runner (prebuild) —
# they are never committed.
on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/native-android.yml"
  workflow_dispatch:

# Two overlapping runs race on the same apk-latest release (one deletes the
# asset while the other publishes → failed run + a release with no APK, i.e.
# a dead footer link). Only the newest build matters — cancel the older one.
concurrency:
  group: native-android-apk
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write # publishes the APK to the fixed "apk-latest" release
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Generate the Android project
        run: npx expo prebuild --platform android --no-install
        env:
          CI: "true"

      - name: Apply release signing (consistent distribution key)
        run: node scripts/apply-release-signing.mjs

      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # The output name/path can shift when native deps change packaging
      # (adding the WebRTC libs broke a hardcoded `cp app-release.apk`).
      # Find the APK wherever gradle put it, and print the tree so a future
      # failure diagnoses itself in the log.
      - name: Rename APK for release
        run: |
          ls -laR android/app/build/outputs/apk || true
          APK=$(find android/app/build/outputs/apk -name "*.apk" -type f | head -n 1)
          if [ -z "$APK" ]; then
            echo "No APK produced under android/app/build/outputs/apk" >&2
            exit 1
          fi
          echo "Publishing: $APK"
          cp "$APK" med-aura.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: med-aura-native-apk
          path: apps/mobile/med-aura.apk
          retention-days: 30

      # The site footer links this fixed asset:
      # https://github.com/mahmoud-fouad2/med-aura/releases/download/apk-latest/med-aura.apk
      - name: Publish APK to the apk-latest release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: تطبيق Med Aura للأندرويد
          body: >
            تطبيق Med Aura الأصلي للأندرويد — أحدث نسخة تُبنى تلقائيًا.
            حمّل med-aura.apk وثبّته مباشرة (فعّل "التثبيت من مصادر غير
            معروفة"، واحذف أي نسخة قديمة أولًا إن وُجدت).
          files: apps/mobile/med-aura.apk
