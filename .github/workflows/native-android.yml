name: Native App Android

# Builds the real native Med Aura app (Expo/React Native) into an installable
# debug APK. Native folders are generated fresh on the runner (prebuild) —
# they are never committed.
on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/native-android.yml"
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Generate the Android project
        run: npx expo prebuild --platform android --no-install
        env:
          CI: "true"

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: med-aura-native-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
