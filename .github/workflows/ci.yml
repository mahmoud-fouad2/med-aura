name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Real Linux CI with a PostgreSQL service: applies migrations, seeds, runs
# typecheck + unit/integration tests + production build on a real database.
jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medaura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/medaura_test
      BETTER_AUTH_SECRET: ci-test-secret-please-change-0123456789
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      APP_URL: http://localhost:3000
      BETTER_AUTH_URL: http://localhost:3000
      ENABLE_DEMO_DATA: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations
        run: pnpm db:migrate


      - name: Seed test database
        run: pnpm db:seed

      - name: Deployment readiness (db:status)
        run: pnpm db:status

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + integration tests (real DB)
        run: pnpm test

      - name: Production build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medaura_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/medaura_e2e
      BETTER_AUTH_SECRET: ci-test-secret-please-change-0123456789
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      APP_URL: http://localhost:3000
      BETTER_AUTH_URL: http://localhost:3000
      ENABLE_DEMO_DATA: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm db:seed
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Build
        run: pnpm build
      - name: E2E (Playwright, real DB)
        run: pnpm test:e2e
